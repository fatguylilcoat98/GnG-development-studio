<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Builds — GNG Development Studio</title>
<style>
  :root{--bg:#0b1020;--panel:#121a30;--line:#22304f;--txt:#dbe4f5;--dim:#8ea0c0;
        --ok:#3ecf8e;--bad:#ff6b6b;--warn:#ffc857;--accent:#5aa7ff}
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--txt);
       font:15px/1.6 system-ui,-apple-system,Segoe UI,sans-serif;min-height:100vh}
  header{display:flex;flex-wrap:wrap;align-items:center;gap:10px 14px;padding:16px 24px;border-bottom:1px solid var(--line)}
  h1{font-size:19px;margin:0}
  .tag{color:var(--dim);font-size:12.5px;flex:1}
  a.nav{color:var(--dim);font-size:12.5px;text-decoration:none;border:1px solid var(--line);
       border-radius:7px;padding:5px 11px;white-space:nowrap}
  a.nav:hover{color:var(--accent);border-color:var(--accent)}
  .agent-pill{font-size:12px;border-radius:99px;padding:4px 12px;border:1px solid var(--line);cursor:pointer}
  .agent-pill.on{color:var(--ok);border-color:var(--ok)}
  .agent-pill.off{color:var(--dim)}
  .agent-pill.blocked{color:var(--bad);border-color:var(--bad)}
  main{max-width:760px;margin:0 auto;padding:32px 20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px;margin-bottom:16px}
  h2{font-size:15px;margin:0 0 16px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
  h3{font-size:13px;margin:14px 0 4px;color:var(--dim)}
  p.lead{color:var(--dim);margin-top:0}
  label{display:block;font-size:13px;color:var(--dim);margin:14px 0 6px}
  input,textarea,select{background:#0d1426;border:1px solid var(--line);color:var(--txt);
       border-radius:8px;padding:12px;font:inherit;font-size:16px;width:100%}
  textarea{min-height:90px;resize:vertical}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:16px}
  .check{display:flex;align-items:center;gap:10px;color:var(--txt);font-size:14.5px;margin:8px 0}
  .check input{width:auto;min-width:20px;min-height:20px}
  button{background:var(--accent);color:#08111f;border:0;border-radius:9px;
         padding:12px 20px;font-weight:700;cursor:pointer;font-size:15px;min-height:44px}
  button:disabled{opacity:.35;cursor:not-allowed}
  button.ghost{background:transparent;color:var(--accent);border:1px solid var(--line)}
  button.danger{background:var(--bad)}
  button.big{width:100%;padding:14px;font-size:16px}
  a.open-btn{display:inline-block;background:var(--ok);color:#08111f;border-radius:9px;
       padding:11px 18px;font-weight:700;text-decoration:none;font-size:14.5px;min-height:44px;line-height:22px}
  .badge{display:inline-block;border-radius:6px;padding:2px 9px;font-size:11.5px;font-weight:700;white-space:nowrap}
  .badge.b-draft{background:#1a2440;color:var(--dim)}
  .badge.b-copy{background:#112a4a;color:var(--accent)}
  .badge.b-wait{background:#2a2408;color:var(--warn)}
  .badge.b-human{background:#3a1414;color:var(--bad)}
  .badge.b-review{background:#241a3a;color:#c9a6ff}
  .badge.b-complete{background:#123626;color:var(--ok)}
  .badge.b-error{background:#3a1414;color:var(--bad)}
  .build-row{display:flex;justify-content:space-between;gap:10px;align-items:center;
       border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:8px 0;cursor:pointer}
  .build-row:hover{border-color:var(--accent)}
  .build-row .bn{font-weight:600}
  .build-row .pn{color:var(--dim);font-size:12.5px}
  .intervention{border:2px solid var(--warn);border-radius:12px;padding:18px;background:#221a08;margin-bottom:14px}
  .intervention h2{color:var(--warn)}
  .decision{border:2px solid var(--bad);border-radius:12px;padding:18px;background:#2a1414;margin-bottom:14px}
  .decision h2{color:var(--bad)}
  pre.copyblock{background:#0d1426;border:1px solid var(--line);border-radius:8px;padding:14px;
       white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;font-size:13px;
       max-height:300px;overflow:auto;margin:10px 0}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:14px;margin:10px 0}
  .kv b{color:var(--dim);font-weight:600;font-size:12.5px}
  .kv span{word-break:break-word;overflow-wrap:anywhere}
  .evidence{border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:#0d1426;
       font-size:13px;margin:10px 0}
  .evidence b{color:var(--dim)}
  .timeline{list-style:none;margin:10px 0 0;padding:0;font-size:13px}
  .timeline li{padding:6px 0;border-bottom:1px solid var(--line)}
  .timeline .t{color:var(--dim);font-size:11.5px}
  .dim{color:var(--dim)} .ok{color:var(--ok)} .bad{color:var(--bad)}
  .hidden{display:none}
  @media (max-width:600px){
    main{padding:16px 10px}
    .card{padding:16px 14px}
    header{padding:12px 14px}
    h1{font-size:17px}
    .tag{flex:1 1 100%;order:3;font-size:12px}
    .row{flex-direction:column;align-items:stretch}
    .row button,.row a.open-btn{width:100%;text-align:center}
    .kv{grid-template-columns:1fr}
    .kv b{margin-top:8px}.kv b:first-child{margin-top:0}
  }
</style>
</head>
<body>
<header>
  <h1>Builds</h1>
  <span class="tag">browser handoff — Studio owns the workflow, AI sites are just workers</span>
  <span id="agent-pill" class="agent-pill off" onclick="editAgentUrl()">server: checking…</span>
  <a class="nav" href="/">← Guided</a>
  <a class="nav" href="/outcomes">Outcomes →</a>
</header>
<main>

  <!-- HOME -->
  <section id="view-home" class="card">
    <h2>Your builds</h2>
    <div class="row" style="margin-top:0;margin-bottom:12px">
      <button class="big" onclick="openNew()">＋ New Build</button>
    </div>
    <div id="build-list" class="dim">Loading…</div>
  </section>

  <!-- NEW BUILD -->
  <section id="view-new" class="card hidden">
    <div class="row" style="margin-top:0;margin-bottom:10px">
      <button class="ghost" onclick="goHome()">← Builds</button>
    </div>
    <h2>New build</h2>
    <label>Build name</label><input id="n-name" placeholder="e.g. Fix Decision Deck styles">

    <label>Server project</label>
    <div id="server-project-area">
      <select id="n-server-project"><option value="">(server not connected)</option></select>
      <div class="row" style="margin-top:8px">
        <button class="ghost" onclick="refreshProjects()">Refresh projects</button>
        <span id="server-status" class="dim" style="font-size:12.5px"></span>
      </div>
    </div>
    <div id="manual-project-area" class="hidden">
      <label>Project name</label><input id="n-project" placeholder="e.g. Decision Deck">
      <label>Project folder / repo path</label><input id="n-repo" placeholder="/home/chris/…">
    </div>

    <label>What do you want done?</label><textarea id="n-goal"></textarea>
    <label>Mode</label>
    <select id="n-mode">
      <option value="audit">Audit</option>
      <option value="fix">Fix</option>
      <option value="build" selected>Build</option>
      <option value="review">Review</option>
    </select>
    <label>Worker sequence</label>
    <select id="n-seq">
      <option value="builder_only">Builder only</option>
      <option value="builder_reviewer" selected>Builder + Reviewer</option>
      <option value="builder_council_reviewer">Builder + Council + Reviewer</option>
    </select>
    <label>Safety rails</label>
    <div id="n-rails"></div>
    <div class="row"><button class="big" onclick="startNewBuild()">Start Build</button></div>
  </section>

  <!-- ACTION -->
  <section id="view-action" class="card hidden">
    <div class="row" style="margin-top:0;margin-bottom:10px">
      <button class="ghost" onclick="goHome()">← Builds</button>
      <span class="dim" id="a-title" style="flex:1;text-align:right"></span>
    </div>
    <div id="action-body">Loading…</div>
    <h3 style="margin-top:22px">Timeline</h3>
    <ul class="timeline" id="a-timeline"></ul>
  </section>

</main>
<script>
const $=id=>document.getElementById(id);
let curBuild=null, agentOk=false, agentProjects=[];

async function j(url,opts){const r=await fetch(url,opts);return r.json();}
async function post(url,body){return j(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});}
function esc(s){const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;}
async function copyText(text){
  try{await navigator.clipboard.writeText(text);}
  catch(e){const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');ta.remove();}
}
function show(id){['view-home','view-new','view-action'].forEach(v=>$(v).classList.toggle('hidden',v!==id));}

/* ── Safe Server Agent (browser-side only; studio.py never calls out) ── */
function agentUrl(){
  return localStorage.getItem('gng-agent-url')||`${location.protocol}//${location.hostname}:8894`;
}
function editAgentUrl(){
  const v=prompt('Safe Server Agent URL:',agentUrl());
  if(v!==null){localStorage.setItem('gng-agent-url',v.trim());checkAgent();}
}
async function agentFetch(path,body){
  const ctl=new AbortController();
  const t=setTimeout(()=>ctl.abort(),body?320000:5000);
  try{
    const r=await fetch(agentUrl()+path,{signal:ctl.signal,
      ...(body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}:{})});
    const data=await r.json();
    if(r.status===403)return{__blocked:true,...data};
    return data;
  }finally{clearTimeout(t);}
}
async function checkAgent(){
  const pill=$('agent-pill');
  try{
    const h=await agentFetch('/health');
    agentOk=h&&h.status==='ok';
    pill.className='agent-pill '+(agentOk?'on':'off');
    pill.textContent=agentOk?`server connected (${h.projects} projects)`:'server not connected';
  }catch(e){agentOk=false;pill.className='agent-pill off';pill.textContent='server not connected';}
  return agentOk;
}
async function refreshProjects(){
  $('server-status').textContent='checking…';
  const ok=await checkAgent();
  const sel=$('n-server-project');
  sel.innerHTML='';
  if(!ok){
    sel.innerHTML='<option value="">(server not connected)</option>';
    $('server-status').textContent='Server not connected — using manual project fields below.';
    $('manual-project-area').classList.remove('hidden');
    agentProjects=[];return;
  }
  try{
    const data=await agentFetch('/projects');
    if(data.__blocked){$('server-status').textContent='Agent blocked request: '+(data.error||'');return;}
    agentProjects=data.projects||[];
    sel.appendChild(new Option('Choose a server project…',''));
    agentProjects.forEach(p=>sel.appendChild(new Option(`${p.name}${p.exists?'':' (folder missing!)'}`,p.id)));
    sel.appendChild(new Option('— not on the server (enter manually) —','__manual__'));
    $('server-status').textContent='Server connected.';
    $('manual-project-area').classList.add('hidden');
  }catch(e){$('server-status').textContent='Could not list projects: '+e;}
}
$('n-server-project')?.addEventListener('change',()=>{
  $('manual-project-area').classList.toggle('hidden',$('n-server-project').value!=='__manual__');
});

/* ── home ── */
const BADGE={'Draft':'b-draft','Copy Prompt':'b-copy','Waiting for Response':'b-wait',
  'Human Decision Needed':'b-human','Review Needed':'b-review','Complete':'b-complete','Error':'b-error'};
async function goHome(){
  show('view-home');curBuild=null;
  const data=await j('/api/builds');
  const builds=data.builds||[];
  $('build-list').innerHTML=builds.length?builds.map(b=>`
    <div class="build-row" onclick="openBuild('${b.id}')">
      <div><div class="bn">${esc(b.buildName)}</div><div class="pn">${esc(b.projectName)} · ${esc(b.mode)}</div></div>
      <span class="badge ${BADGE[b.status]||'b-draft'}">${esc(b.status)}</span>
    </div>`).join('')
    :'<div class="dim">No builds yet. Hit ＋ New Build.</div>';
}

/* ── new build ── */
const RAILS=["Do not deploy","Do not delete originals","Do not touch secrets",
  "Do not restart services","Do not change unrelated projects","Ask before risky actions"];
function openNew(){
  $('n-name').value='';$('n-goal').value='';$('n-project').value='';$('n-repo').value='';
  $('n-mode').value='build';$('n-seq').value='builder_reviewer';
  $('n-rails').innerHTML=RAILS.map((r,i)=>
    `<label class="check"><input type="checkbox" id="rail-${i}" checked> ${esc(r)}</label>`).join('');
  show('view-new');
  refreshProjects();
}
async function startNewBuild(){
  const rails=RAILS.filter((r,i)=>$(`rail-${i}`).checked);
  const spid=$('n-server-project').value;
  const sp=agentProjects.find(p=>p.id===spid);
  const body={buildName:$('n-name').value,userGoal:$('n-goal').value,
    mode:$('n-mode').value,workerSequence:$('n-seq').value,safetyRails:rails,
    projectName:sp?sp.name:$('n-project').value,
    repoPath:sp?sp.path:$('n-repo').value,
    serverProjectId:sp?sp.id:''};
  const rec=await post('/api/builds',body);
  if(rec.error){alert(rec.error);return;}
  curBuild=rec.id;
  show('view-action');
  $('a-title').textContent=rec.buildName;
  let inspection=null;
  if(sp){
    $('action-body').innerHTML='<p class="lead">Inspecting project safely…</p>';
    try{
      const ins=await agentFetch('/inspect',{projectId:sp.id,mode:body.mode});
      if(ins.__blocked){$('action-body').innerHTML+=`<p class="bad">Agent blocked request: ${esc(ins.error)}</p>`;}
      else inspection=ins;
    }catch(e){$('action-body').innerHTML+=`<p class="bad">Inspection failed: ${esc(String(e))}</p>`;}
  }
  const started=await post(`/api/builds/${rec.id}/start`,inspection?{inspection}:{});
  if(started.error){alert(started.error);return;}
  renderBuild(started);
}

/* ── action screen ── */
async function openBuild(id){
  curBuild=id;show('view-action');
  const b=await j(`/api/builds/${id}`);
  $('a-title').textContent=b.buildName;
  renderBuild(b);
}
async function act(action,body){
  const b=await post(`/api/builds/${curBuild}/${action}`,body||{});
  if(b.error){alert(b.error);return;}
  renderBuild(b);
}
function evidenceHtml(b){
  const ins=b.inspection;
  if(!ins)return '';
  const checks=(ins.allowed_checks||[]);
  return `<div class="evidence">
    <b>Server evidence</b><br>
    Git: ${esc(ins.git_branch||'?')} — ${esc((ins.git_status||'').split('\n')[0]||'clean')}<br>
    Docs: ${esc((ins.docs||[]).slice(0,4).join(', ')||'none found')}<br>
    Stack: ${esc((ins.stack||[]).join(', ')||'unknown')} · Files: ${esc(String(ins.tree?.file_count??'?'))}<br>
    ${ins.risks&&ins.risks.length?`<span class="bad">Blockers/risks: ${esc(ins.risks.join('; '))}</span><br>`:''}
    ${checks.length?`Tests available: ${checks.map(c=>`<button class="ghost" style="min-height:30px;padding:4px 10px;font-size:12px" onclick="runCheck('${esc(c)}')">${esc(c)}</button>`).join(' ')}`:'Tests available: none approved'}
    <span id="check-result"></span>
  </div>`;
}
async function runCheck(name){
  const b=await j(`/api/builds/${curBuild}`);
  const spid=b.serverProjectId;
  if(!spid){alert('This build has no server project.');return;}
  $('check-result').innerHTML='<br>Running '+esc(name)+'…';
  try{
    const r=await agentFetch('/run-check',{projectId:spid,checkName:name});
    if(r.__blocked){$('check-result').innerHTML='<br><span class="bad">Agent blocked request: '+esc(r.error)+'</span>';return;}
    const ok=r.exit_code===0;
    $('check-result').innerHTML=`<br>${esc(name)}: <span class="${ok?'ok':'bad'}">exit ${r.exit_code}</span> (${r.duration_ms}ms)`;
    await act('note',{event:'Check run',detail:`${name}: exit ${r.exit_code} in ${r.duration_ms}ms`});
  }catch(e){$('check-result').innerHTML='<br><span class="bad">Check failed to run: '+esc(String(e))+'</span>';}
}
const CHOICE_LABELS={retry_step:'Retry this step',back_to_builder:'Send back to Builder',
  continue_next:'Continue to next step',mark_complete:'Mark build complete',stop:'Stop build'};
function renderBuild(b){
  const body=$('action-body');
  const s=b.currentStep||{};
  const purpose={builder:'Builder',council:'Council',reviewer:'Reviewer'}[s.role]||'';
  let html='';
  if(b.status==='Draft'){
    html=`<p class="lead">This build hasn't started yet.</p>
      <div class="row"><button class="big" onclick="act('start')">Start Build</button></div>`;
  }else if(s.phase==='copy'){
    html=`${evidenceHtml(b)}
      <div class="intervention">
        <h2>Copy this prompt</h2>
        <div class="kv" style="margin-top:0">
          <b>Worker</b><span>${esc(s.workerName||'')}</span>
          <b>Step</b><span>${esc(purpose)}</span>
        </div>
        <pre class="copyblock" id="prompt-text">${esc(s.prompt||'')}</pre>
        <div class="row">
          <button onclick="copyText($('prompt-text').textContent);act('copied')">Copy Prompt</button>
          ${s.workerUrl?`<a class="open-btn" href="${esc(s.workerUrl)}" target="_blank" rel="noopener" onclick="act('opened')">Open ${esc(s.workerName)} →</a>`
            :`<span class="dim">Run this in your Claude Code terminal.</span>`}
          <button class="ghost big" onclick="act('pasted')">I pasted it — ready for the response</button>
        </div>
        <label style="margin-top:14px">Worker for this step</label>
        <select onchange="act('worker',{worker:this.value})">
          ${Object.entries(b.workers||{}).map(([k,w])=>`<option value="${k}" ${k===s.worker?'selected':''}>${esc(w.name)}</option>`).join('')}
        </select>
      </div>`;
  }else if(s.phase==='paste'){
    html=`<div class="intervention">
      <h2>Paste the worker response here</h2>
      <p class="lead">${esc(s.workerName||'')} (${esc(purpose)}) — paste its full reply, including the RESULT line.</p>
      <textarea id="resp-text" style="min-height:180px"></textarea>
      <div class="row"><button class="big" onclick="act('response',{raw:$('resp-text').value})">Save Response &amp; Continue</button></div>
    </div>`;
  }else if(s.phase==='human'){
    const d=s.decision||{};
    html=`<div class="decision">
      <h2>Decision needed</h2>
      <p><b>Why Studio stopped:</b> ${esc(d.reason||'')}</p>
      ${d.recommended?`<p><b>Recommended:</b> ${esc(CHOICE_LABELS[d.recommended]||d.recommended)}</p>`:''}
      <p><b>Risks:</b> ${esc(d.risks||'')}</p>
      ${lastResponseHtml(b)}
      <div class="row">
        ${d.recommended?`<button class="big" onclick="act('decision',{choice:'${d.recommended}'})">Approve recommended — ${esc(CHOICE_LABELS[d.recommended])}</button>`:''}
        <button class="ghost" onclick="$('other-choices').classList.toggle('hidden')">Choose other</button>
        <button class="danger" onclick="if(confirm('Stop this build?'))act('decision',{choice:'stop'})">Stop build</button>
      </div>
      <div id="other-choices" class="hidden">
        ${(d.choices||[]).filter(c=>c!=='stop'&&c!==d.recommended).map(c=>
          `<div class="row"><button class="ghost big" onclick="act('decision',{choice:'${c}'})">${esc(CHOICE_LABELS[c]||c)}</button></div>`).join('')}
      </div>
    </div>`;
  }else{ // done — Complete or Error
    html=`<h2 class="${b.status==='Complete'?'ok':'bad'}" style="color:${b.status==='Complete'?'var(--ok)':'var(--bad)'}">${esc(b.status==='Complete'?'Build Complete':'Build Stopped')}</h2>
      <pre class="copyblock">${esc(b.finalReport||'')}</pre>
      <h3>Worker responses</h3>
      ${b.responses.length?b.responses.map(r=>`<div class="evidence"><b>${esc(r.role)} (${esc((b.workers[r.worker]||{}).name||r.worker)})</b> — ${esc(r.outcome||'unclear')}<pre class="copyblock" style="max-height:160px">${esc(r.raw)}</pre></div>`).join(''):'<p class="dim">none</p>'}`;
  }
  body.innerHTML=html;
  $('a-timeline').innerHTML=(b.timeline||[]).slice().reverse().map(t=>
    `<li><span class="t">${esc(t.at)}</span> — <b>${esc(t.event)}</b>${t.detail?` · ${esc(t.detail)}`:''}</li>`).join('');
}
function lastResponseHtml(b){
  const r=b.responses[b.responses.length-1];
  if(!r)return '';
  return `<h3>The response Studio is asking about</h3><pre class="copyblock" style="max-height:180px">${esc(r.raw)}</pre>`;
}

(async()=>{ checkAgent(); goHome(); })();
</script>
</body>
</html>
